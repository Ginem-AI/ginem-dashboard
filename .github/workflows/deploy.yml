name: Deploy to Firebase

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-firebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build
        env:
          VITE_APP_STAGE: ${{ secrets.VITE_APP_STAGE }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_LOCAL_STORAGE_KEY: ${{ secrets.VITE_LOCAL_STORAGE_KEY }}
          VITE_UPLOAD_FILE_URL: ${{ secrets.VITE_UPLOAD_FILE_URL }}
          VITE_UPLOAD_FILE_API_KEY: ${{ secrets.VITE_UPLOAD_FILE_API_KEY }}
          VITE_TOKEN_KEY_LOCAL_STORAGE: ${{ secrets.VITE_TOKEN_KEY_LOCAL_STORAGE }}
          VITE_TOKEN_SECRET: ${{ secrets.VITE_TOKEN_SECRET }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ginem-ai
          channelId: live
